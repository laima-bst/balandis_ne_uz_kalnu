<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Strava Competition Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:       #f5f5f5;
      --card:     #ffffff;
      --primary:  #fc4c02;   /* Strava orange */
      --text:     #1a1a1a;
      --muted:    #666;
      --border:   #e5e5e5;
      --gold:     #f5a623;
      --silver:   #9b9b9b;
      --bronze:   #c47a3a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: inline-block;
      min-width: 100%;
    }

    /* ---- Header ---- */
    header {
      width: 100%;
      background: var(--primary);
      color: white;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; flex: 1; min-width: 0; }
    header .meta { font-size: 0.8rem; opacity: 0.85; display: flex; flex-direction: column; align-items: flex-end; gap: 0.4rem; flex-shrink: 0; }
    #last-updated { opacity: 0.85; white-space: nowrap; }
    @media (max-width: 480px) {
      header { flex-direction: column; align-items: flex-start; gap: 0.4rem; }
      header h1 { font-size: 1.15rem; }
      #last-updated { white-space: normal; }
    }

    /* ---- Layout ---- */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1rem;
      display: grid;
      gap: 1.5rem;
    }

    /* ---- Cards ---- */
    .card {
      background: var(--card);
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 1.25rem 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.05);
    }
    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    /* ---- Leaderboard ---- */
    .leaderboard { width: 100%; border-collapse: collapse; }
    .leaderboard th {
      text-align: left;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .leaderboard td {
      padding: 0.75rem 0.75rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.95rem;
    }
    .leaderboard tr:last-child td { border-bottom: none; }
    .leaderboard tr:hover td { background: #fafafa; }
    .rank-1 .rank-badge { color: var(--gold); }
    .rank-2 .rank-badge { color: var(--silver); }
    .rank-3 .rank-badge { color: var(--bronze); }
    .rank-badge { font-size: 1.1rem; font-weight: 700; }
    .points-cell { font-weight: 700; color: var(--primary); }
    .ppp-header {
      background: rgba(252, 76, 2, 0.08);
      color: var(--primary) !important;
      font-weight: 700 !important;
    }
    .ppp-cell {
      font-weight: 800;
      font-size: 1.05rem;
      color: var(--primary);
      background: rgba(252, 76, 2, 0.06);
    }
    .athlete-name { font-weight: 600; cursor: pointer; }
    .athlete-name:hover { text-decoration: underline; color: var(--primary); }

    /* ---- Chart row ---- */
    .charts-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }
    @media (max-width: 640px) { .charts-row { grid-template-columns: 1fr; } }
    .chart-wrap { position: relative; height: 260px; }

    /* ---- Activity feed ---- */
    .feed { list-style: none; }
    .feed li {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.7rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }
    .feed li:last-child { border-bottom: none; }
    .feed .sport-icon {
      width: 2.2rem;
      height: 2.2rem;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .feed .act-details { flex: 1; }
    .feed .act-name { font-weight: 600; }
    .feed .act-meta { color: var(--muted); font-size: 0.8rem; margin-top: 2px; }
    .feed .act-pts { font-weight: 700; color: var(--primary); white-space: nowrap; }

    /* ---- Athlete detail modal ---- */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card);
      border-radius: 14px;
      padding: 1.5rem;
      max-width: 480px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      position: relative;
    }
    .modal h3 { font-size: 1.2rem; margin-bottom: 1rem; }
    .modal .close-btn {
      position: absolute; top: 1rem; right: 1rem;
      background: none; border: none; font-size: 1.4rem;
      cursor: pointer; color: var(--muted);
    }
    .modal table { width: 100%; border-collapse: collapse; margin-top: .5rem; }
    .modal table td { padding: .4rem .5rem; border-bottom: 1px solid var(--border); font-size: .9rem; }
    .modal table td:last-child { text-align: right; font-weight: 600; }
    .modal table tr:last-child td { border-bottom: none; }

    /* ---- Bump chart ---- */
    .bump-wrap { position: relative; height: 320px; }

    /* ---- Expandable activity rows ---- */
    .athlete-row { cursor: pointer; }
    .athlete-row td { transition: background 0.15s; }
    .athlete-row:hover td { background: #fafafa; }
    .athlete-row .toggle-arrow { display: inline-block; margin-right: 0.4rem; transition: transform 0.2s; color: var(--muted); font-size: 0.8rem; }
    .athlete-row.open .toggle-arrow { transform: rotate(90deg); }
    .activities-expand { display: none; }
    .activities-expand.open { display: table-row; }
    .activities-expand td { padding: 0 0.75rem 0.75rem; background: #fafafa; border-bottom: 1px solid var(--border); }
    .act-list { list-style: none; display: flex; flex-direction: column; gap: 0.4rem; }
    .act-list li { display: flex; align-items: center; gap: 0.75rem; font-size: 0.875rem; padding: 0.35rem 0.5rem; border-radius: 6px; background: white; border: 1px solid var(--border); }
    .act-list .act-icon { font-size: 1rem; width: 1.5rem; text-align: center; flex-shrink: 0; }
    .act-list .act-info { flex: 1; }
    .act-list .act-title { font-weight: 600; }
    .act-list .act-sub { color: var(--muted); font-size: 0.78rem; margin-top: 1px; }
    .act-list .act-pts { font-weight: 700; color: var(--primary); white-space: nowrap; }

    /* ---- Misc ---- */
    .updated { font-size: 0.75rem; color: var(--muted); text-align: right; margin-top: .5rem; }
    #loading { text-align: center; padding: 4rem; color: var(--muted); }
    #error { text-align: center; padding: 4rem; color: #c0392b; display: none; }

    /* ---- Run log ---- */
    .log-toggle {
      width: 100%;
      background: none;
      border: none;
      text-align: left;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0;
      font-size: 1rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .log-toggle .log-arrow { transition: transform 0.2s; font-size: 0.75rem; }
    .log-toggle.open .log-arrow { transform: rotate(180deg); }
    .log-body { display: none; margin-top: 1rem; }
    .log-body.open { display: block; }
    .log-entry {
      border-left: 3px solid var(--border);
      padding: 0.6rem 0 0.6rem 1rem;
      margin-bottom: 0.75rem;
      font-size: 0.875rem;
    }
    .log-entry:last-child { margin-bottom: 0; }
    .log-entry .log-time { font-weight: 600; color: var(--text); }
    .log-entry .log-count { color: var(--primary); font-weight: 700; margin-left: 0.5rem; }
    .log-entry .log-acts { margin-top: 0.4rem; display: flex; flex-direction: column; gap: 0.2rem; }
    .log-act { color: var(--muted); font-size: 0.8rem; }
    .log-none { color: var(--muted); font-style: italic; }
  </style>
</head>
<body>

<header>
  <h1 id="comp-name">Competition Dashboard</h1>
  <div class="meta" id="comp-meta">
    <div id="last-updated"></div>
  </div>
</header>

<main id="app">
  <div id="loading">Loading data...</div>
  <div id="error">Failed to load data.json. Make sure to run <code>scripts/fetch_and_update.py</code> first.</div>
</main>

<!-- Athlete detail modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="close-btn" onclick="closeModal()">&#x2715;</button>
    <h3 id="modal-name"></h3>
    <table id="modal-table"></table>
  </div>
</div>

<script>
const SPORT_ICONS = {
  Run: "🏃", Ride: "🚴", Swim: "🏊", Walk: "🚶", Hike: "🥾",
  VirtualRide: "🚴", VirtualRun: "🏃", NordicSki: "⛷️",
  AlpineSki: "🎿", WeightTraining: "🏋️", Yoga: "🧘", default: "⚡"
};

function sportIcon(type) {
  return SPORT_ICONS[type] || SPORT_ICONS.default;
}

function fmtTime(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

function fmtDate(iso) {
  return new Date(iso).toLocaleDateString(undefined, { month: "short", day: "numeric" });
}

// ---- Team colours ----
const TEAM_COLORS = ["#e74c3c", "#3498db", "#2ecc71", "#9b59b6", "#f39c12",
                     "#1abc9c", "#e67e22", "#34495e", "#e91e63", "#00bcd4"];

let athleteData = {};
let athleteColorMap = {};  // athlete_key → team color

function buildColorMaps(teams) {
  teams.forEach((t, i) => {
    const color = TEAM_COLORS[i % TEAM_COLORS.length];
    t.color = color;
    (t.members || []).forEach(name => {
      athleteColorMap[name.toLowerCase().replace(/ /g, "_")] = color;
    });
  });
}

function openModal(key) {
  const a = athleteData[key];
  if (!a) return;
  document.getElementById("modal-name").textContent = a.name;
  const rows = Object.entries(a.by_type).sort((x,y) => y[1].points - x[1].points)
    .map(([type, s]) =>
      `<tr><td>${sportIcon(type)} ${type}</td><td>${s.count} activities</td><td>${s.distance_km.toFixed(1)} km</td><td>${s.points} pts</td></tr>`
    ).join("");
  document.getElementById("modal-table").innerHTML =
    `<tr style="font-weight:600;color:var(--muted)"><td>Type</td><td>Count</td><td>Distance</td><td>Points</td></tr>` + rows;
  document.getElementById("modal").classList.add("open");
}

function closeModal() {
  document.getElementById("modal").classList.remove("open");
}
document.getElementById("modal").addEventListener("click", e => {
  if (e.target === e.currentTarget) closeModal();
});

// ---- Build team leaderboard ----
function buildTeams(teams) {
  if (!teams || teams.length === 0) return "";
  const medal = r => r === 1 ? "🥇" : r === 2 ? "🥈" : r === 3 ? "🥉" : r;
  const rows = teams.map(t => `
    <tr class="${t.rank <= 3 ? `rank-${t.rank}` : ""}">
      <td><span class="rank-badge">${medal(t.rank)}</span></td>
      <td>
        <span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:${t.color};margin-right:8px;vertical-align:middle;"></span>
        <strong>${t.name}</strong>
      </td>
      <td class="ppp-cell">${t.points_per_person}</td>
      <td class="points-cell" style="font-size:0.9rem">${t.total_points}</td>
      <td style="color:var(--muted);font-size:0.85rem">${t.member_count}</td>
      <td>${t.activity_count}</td>
      <td>${t.total_distance_km.toFixed(1)} km</td>
    </tr>`).join("");
  return `
    <div class="card">
      <h2>Team Leaderboard</h2>
      <table class="leaderboard">
        <thead>
          <tr>
            <th>#</th>
            <th>Team</th>
            <th class="ppp-header">Pts / Person ↓</th>
            <th>Total pts</th>
            <th>Members</th>
            <th>Activities</th>
            <th>Distance</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

// ---- Build bump chart (team rankings over time) ----
function aprilDates() {
  const dates = [];
  for (let d = 1; d <= 30; d++) {
    dates.push(`2026-04-${String(d).padStart(2, "0")}`);
  }
  return dates;
}

function buildBumpChart(dailyRankings, teams) {
  if (!dailyRankings || dailyRankings.length === 0) return "";
  return `
    <div class="card">
      <h2>Team Points Over Time</h2>
      <div class="bump-wrap"><canvas id="chart-bump"></canvas></div>
    </div>`;
}

function initBumpChart(dailyRankings, teams) {
  if (!dailyRankings || dailyRankings.length === 0) return;
  const numTeams = teams.length;
  const allDates = aprilDates();

  // Index daily rankings by date for quick lookup
  const rankByDate = {};
  dailyRankings.forEach(d => { rankByDate[d.date] = d.rankings; });

  // Index daily points by date for quick lookup
  const pointsByDate = {};
  dailyRankings.forEach(d => { pointsByDate[d.date] = d.points; });

  const datasets = teams.map(t => ({
    label: t.name,
    data: allDates.map(date => pointsByDate[date]?.[t.name] ?? null),
    borderColor: t.color,
    backgroundColor: t.color,
    borderWidth: 3,
    pointRadius: 6,
    pointHoverRadius: 9,
    pointBackgroundColor: t.color,
    tension: 0.3,
    fill: false,
    spanGaps: false,
  }));

  new Chart(document.getElementById("chart-bump"), {
    type: "line",
    data: {
      labels: allDates.map(d => {
        const day = parseInt(d.split("-")[2]);
        return `Apr ${day}`;
      }),
      datasets
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: {
          beginAtZero: true,
          ticks: { callback: v => `${v} pts` },
          grid: { color: "#f0f0f0" },
        },
        x: {
          grid: { display: false },
          ticks: { maxTicksLimit: 10 },
        },
      },
      plugins: {
        legend: { position: "bottom", labels: { boxWidth: 12 } },
        tooltip: {
          filter: item => item.parsed.y !== null,
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y} pts`,
          }
        }
      }
    }
  });
}

// ---- Toggle athlete activity expand ----
function toggleAthlete(key) {
  const row = document.getElementById(`row-${key}`);
  const expand = document.getElementById(`expand-${key}`);
  row.classList.toggle("open");
  expand.classList.toggle("open");
}

// ---- Build leaderboard table with expandable activities ----
function buildLeaderboard(leaderboard, activities) {
  // Group activities by athlete_key
  const byAthlete = {};
  activities.forEach(a => {
    if (!byAthlete[a.athlete_key]) byAthlete[a.athlete_key] = [];
    byAthlete[a.athlete_key].push(a);
  });

  const rows = leaderboard.map(a => {
    const key = a.name.toLowerCase().replace(/ /g, "_");
    const rankClass = a.rank <= 3 ? `rank-${a.rank}` : "";
    const medal = a.rank === 1 ? "🥇" : a.rank === 2 ? "🥈" : a.rank === 3 ? "🥉" : a.rank;
    const acts = (byAthlete[key] || []).map(act => `
      <li>
        <span class="act-icon">${sportIcon(act.sport_type)}</span>
        <span class="act-info">
          <div class="act-title">${act.name || act.sport_type}</div>
          <div class="act-sub">${act.start_date ? fmtDate(act.start_date) : "—"} · ${act.distance_km} km · ${fmtTime(act.moving_time_s)}</div>
        </span>
        <span class="act-pts">+${act.points} pts</span>
      </li>`).join("");

    const teamColor = athleteColorMap[key] || "#ccc";
    return `
      <tr class="athlete-row ${rankClass}" id="row-${key}" onclick="toggleAthlete('${key}')">
        <td style="border-left:4px solid ${teamColor}"><span class="rank-badge">${medal}</span></td>
        <td><span class="toggle-arrow">▶</span><strong>${a.name}</strong></td>
        <td class="points-cell">${a.total_points}</td>
        <td>${a.activity_count}</td>
        <td>${a.total_distance_km.toFixed(1)} km</td>
        <td>${a.total_elevation_m.toFixed(0)} m</td>
      </tr>
      <tr class="activities-expand" id="expand-${key}">
        <td colspan="6" style="border-left:4px solid ${teamColor}"><ul class="act-list">${acts}</ul></td>
      </tr>`;
  }).join("");

  return `
    <div class="card">
      <h2>Individual Leaderboard</h2>
      <table class="leaderboard">
        <thead>
          <tr>
            <th>#</th><th>Athlete</th><th>Points</th><th>Activities</th><th>Distance</th><th>Elevation</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

// ---- Build charts ----
function buildCharts(leaderboard) {
  const names  = leaderboard.map(a => a.name.split(" ")[0]);
  const points = leaderboard.map(a => a.total_points);
  const COLORS = leaderboard.map((_, i) => `hsl(${(i * 37) % 360},70%,55%)`);

  return `
    <div class="charts-row">
      <div class="card">
        <h2>Points</h2>
        <div class="chart-wrap"><canvas id="chart-points"></canvas></div>
      </div>
      <div class="card">
        <h2>Activities by type</h2>
        <div class="chart-wrap"><canvas id="chart-types"></canvas></div>
      </div>
    </div>`;
}

function initCharts(leaderboard, activities) {
  const names  = leaderboard.map(a => a.name.split(" ")[0]);
  const points = leaderboard.map(a => a.total_points);
  const barColors = leaderboard.map(a => athleteColorMap[a.name.toLowerCase().replace(/ /g, "_")] || "#fc4c02");

  new Chart(document.getElementById("chart-points"), {
    type: "bar",
    data: {
      labels: names,
      datasets: [{
        label: "Points",
        data: points,
        backgroundColor: barColors,
        borderRadius: 6,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: { y: { beginAtZero: true } }
    }
  });

  // Count by sport type across all activities
  const typeCounts = {};
  activities.forEach(a => {
    typeCounts[a.sport_type] = (typeCounts[a.sport_type] || 0) + 1;
  });
  const typeLabels = Object.keys(typeCounts);
  const typeData   = typeLabels.map(t => typeCounts[t]);
  const typeColors = typeLabels.map((_, i) => `hsl(${(i * 53) % 360},65%,55%)`);

  new Chart(document.getElementById("chart-types"), {
    type: "doughnut",
    data: {
      labels: typeLabels.map(t => `${sportIcon(t)} ${t}`),
      datasets: [{ data: typeData, backgroundColor: typeColors }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: "bottom", labels: { boxWidth: 12 } } }
    }
  });
}

// ---- Build activity feed ----
function buildFeed(activities) {
  const items = activities.slice(0, 30).map(a => `
    <li>
      <div class="sport-icon">${sportIcon(a.sport_type)}</div>
      <div class="act-details">
        <div class="act-name">${a.name || a.sport_type}</div>
        <div class="act-meta">${a.athlete_name} · ${fmtDate(a.start_date)} · ${a.distance_km} km · ${fmtTime(a.moving_time_s)}</div>
      </div>
      <div class="act-pts">+${a.points} pts</div>
    </li>`).join("");

  return `
    <div class="card">
      <h2>Recent Activities</h2>
      <ul class="feed">${items}</ul>
    </div>`;
}

// ---- Build run log ----
function buildRunLog(runLog) {
  if (!runLog || runLog.length === 0) return "";
  const entries = runLog.map(entry => {
    const time = new Date(entry.timestamp).toLocaleString("lt-LT");
    const countLabel = entry.new_count === 0
      ? `<span class="log-none">no new activities</span>`
      : `<span class="log-count">+${entry.new_count} ${entry.new_count === 1 ? "activity" : "activities"}</span>`;
    const acts = (entry.activities || []).map(a =>
      `<div class="log-act">${sportIcon(a.sport)} ${a.athlete} · ${a.sport} · ${a.distance_km} km · <em>${a.name}</em></div>`
    ).join("");
    return `
      <div class="log-entry">
        <span class="log-time">${time}</span>${countLabel}
        ${acts ? `<div class="log-acts">${acts}</div>` : ""}
      </div>`;
  }).join("");
  return `
    <div class="card">
      <button class="log-toggle" onclick="toggleLog(this)">
        Update log
        <span class="log-arrow">▼</span>
      </button>
      <div class="log-body">${entries}</div>
    </div>`;
}

function toggleLog(btn) {
  btn.classList.toggle("open");
  btn.nextElementSibling.classList.toggle("open");
}

// ---- Render helper ----
function renderData(data) {
  buildColorMaps(data.teams || []);

  athleteData = {};
  data.leaderboard.forEach(a => {
    athleteData[a.name.toLowerCase().replace(/ /g, "_")] = a;
  });

  document.getElementById("comp-name").textContent = data.competition.name;
  document.getElementById("last-updated").textContent =
    `Atnaujinta: ${new Date(data.generated_at).toLocaleString("lt-LT")}`;

  const app = document.getElementById("app");
  app.innerHTML =
    buildTeams(data.teams) +
    buildBumpChart(data.daily_rankings, data.teams) +
    buildCharts(data.leaderboard, data.activities) +
    buildLeaderboard(data.leaderboard, data.activities) +
    buildRunLog(data.run_log);

  initBumpChart(data.daily_rankings, data.teams);
  initCharts(data.leaderboard, data.activities);
}

// ---- Main ----
async function init() {
  try {
    const resp = await fetch("data.json");
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    renderData(await resp.json());
  } catch (err) {
    document.getElementById("loading").style.display = "none";
    document.getElementById("error").style.display = "block";
    console.error(err);
  }
}

init();
</script>
</body>
</html>
