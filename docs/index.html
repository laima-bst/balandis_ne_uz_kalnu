<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Balandis ne už kalnų 2026</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #fc4c02;
      color: white;
      padding: 1.25rem 1.5rem;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .banner {
      background: white;
      border-radius: 12px;
      padding: 3rem 2.5rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    .banner h2 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #1a1a1a;
    }
    .banner p {
      font-size: 1rem;
      color: #555;
      line-height: 1.6;
    }
    .badge {
      display: inline-block;
      margin-top: 1.5rem;
      background: #fc4c02;
      color: white;
      font-weight: 600;
      font-size: 0.9rem;
      padding: 0.5rem 1.25rem;
      border-radius: 999px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Balandis ne už kalnų 2026</h1>
  </header>
  <main>
    <div class="banner">
      <div class="icon">🏁</div>
      <h2>Varžybos baigėsi!</h2>
      <p>Balandžio mėnesio iššūkis oficialiai užbaigtas.<br>
         Rezultatai bus paskelbti <strong>antradienį</strong>.</p>
      <div class="badge">Iki pasimatymo! 👋</div>
    </div>
  </main>
</body>
</html>
