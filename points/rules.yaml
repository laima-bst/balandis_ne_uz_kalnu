# Activity types to include (Strava sport_type values).
# Everything NOT listed here is ignored entirely.
# Common types: Run, Ride, Swim, Walk, Hike, VirtualRide, VirtualRun,
#               WeightTraining, Yoga, Workout, NordicSki, AlpineSki
included_activity_types:
  - Run
  - Ride
  - Swim
  - Walk
  - Hike
  - VirtualRide
  - VirtualRun
  - NordicSki

# Points per km by activity type.
# Activities without a matching type inherit the 'default' value.
points_per_km:
  Run:        3
  Ride:       1
  Swim:       15   # Strava reports swim in metres; handled automatically
  Walk:        3
  Hike:        3
  VirtualRide: 1
  VirtualRun:  3

# Bonus points per 100m of elevation gain (applied on top of distance points).
# Set to 0 to disable.
elevation_bonus_per_100m: 0

# Cap the maximum points a single activity can contribute.
# Set to null to disable the cap.
max_points_per_activity: null

# Minimum activity duration in seconds to count (filters out accidental
# 30-second "activities").
min_duration_seconds: 300
