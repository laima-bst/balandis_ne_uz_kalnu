name: Refresh competition data

on:
  schedule:
    # 23:59 Lithuania summer time (EEST = UTC+3). Switch to "59 21 * * *" in winter (EET = UTC+2).
    - cron: "59 20 * * *"
  workflow_dispatch:  # Also allows manual trigger from the GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit data.json back to the repo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch Strava data and update data.json
        env:
          STRAVA_CLIENT_ID:       ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET:   ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_CLUB_ID:         ${{ secrets.STRAVA_CLUB_ID }}
          STRAVA_ACCESS_TOKEN:    ${{ secrets.STRAVA_ACCESS_TOKEN }}
          STRAVA_REFRESH_TOKEN:   ${{ secrets.STRAVA_REFRESH_TOKEN }}
          STRAVA_TOKEN_EXPIRES_AT: ${{ secrets.STRAVA_TOKEN_EXPIRES_AT }}
        run: python scripts/fetch_and_update.py

      - name: Commit updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json docs/activities_archive.json
          # Only commit if anything changed
          git diff --staged --quiet || git commit -m "chore: refresh competition data [skip ci]"
          git push
